# Strategy / TA / risk — safe to commit. Secrets only in `.env`.
# Precedence: environment variable > this file > code defaults.
# Override file path: CONFIG_PATH=/path/to/custom.toml

[strategy]
assets = ["btc", "eth", "sol", "xrp", "bnb", "doge"]
durations = ["15m"]
gamma_tag_id = 102127
min_edge = "0.10"
min_confidence = "0.72"
min_order_usdc = "10"
slippage_bps = "0.002"

[technical]
spot_exchange = "binance"
candle_interval = "1m"
candle_lookback = 150
rsi_period = 16
macd_fast = 12
macd_slow = 28
macd_signal = 9
volume_min_ratio = 0.5
volume_avg_bars = 20
volume_use_closed_candle_only = true

[cluster]
rsi_oversold = 35.0
rsi_overbought = 65.0
# Direction veto: skip BUY YES when RSI above this; skip BUY NO when RSI below this (0 = off).
# Widened: shadow data shows rsi_yes_over_max 81% WR, rsi_no_below_min 100% WR.
rsi_yes_max = 80.0
rsi_no_min = 0.0
mom5_abs = 0.003
mom15_abs = 0.005
min_market_yes_price = "0.08"
max_market_yes_price = "0.53"
min_secs_to_close = 350
min_liquidity = "8000"
cluster_tie_min_edge_multiplier = 1.5
min_momentum_5m_abs = 0.0001
neutral_taker_edge_multiplier = 1.5
# Global defaults for direction-quality filters (0 / false = off; per-asset overrides below).
min_macd_histogram_abs = 0.0
taker_direction_confirm = false
yes_confidence_penalty = 0.0
no_confidence_penalty = 0.0
# Direction override: when market_matcher forces the opposite side, use a relaxed edge
# threshold (fraction of normal min_edge). Shadow data shows 90% WR on these trades.
direction_override_edge_fraction = 0.50
expiry_dampen_last_secs = 120
cheap_token_price_threshold = "0.42"
cheap_token_max_usdc = "5"
large_order_usdc_hard_cap = "25"
# DOWN cluster: stricter min_confidence; mid YES-price band: higher min_edge; TBR neutral band / alignment thresholds.
cluster_down_confidence_add = 0.03
mid_price_band_low = "0.20"
mid_price_band_high = "0.35"
mid_price_band_min_edge_multiplier = 1.25
taker_yes_min_ratio = 0.55
taker_no_max_ratio = 0.45
taker_neutral_low = 0.45
taker_neutral_high = 0.55

[volatility]
min_std_pct = "0.025"
max_std_pct = "0.45"
sample_bars = 20

[risk]
max_position_pct = "0.05"
daily_loss_limit_pct = "0.30"
initial_balance = "200"

[htf]
enabled = true
interval = "15m"
lookback = 50
ema_period = 20

[adaptive]
enabled = true
trade_window = 10

[execution]
dry_run = true
cycle_secs = 60
# GTD lifecycle: cancel resting orders after this many seconds; REST poll only for orders older than poll_min_order_age_secs.
fill_timeout_secs = 300
poll_min_order_age_secs = 10
clob_host = "https://clob.polymarket.com"
signature_type = "GNOSIS_SAFE"
data_dir = "data"

[asset.btc]
min_edge = "0.03"
min_confidence = "0.75"
candle_lookback = 200
volume_min_ratio = 0.6
vol_min_std_pct = "0.020"
vol_max_std_pct = "0.35"
htf_enabled = true
max_secs_to_close = 750
taker_direction_confirm = true
taker_yes_min_ratio = 0.60
taker_no_max_ratio = 0.40
taker_neutral_low = 0.40
taker_neutral_high = 0.60
cheap_token_max_usdc = "10"

[asset.eth]
min_edge = "0.03"
min_confidence = "0.72"
min_secs_to_close = 400
candle_lookback = 150
volume_min_ratio = 0.5
vol_min_std_pct = "0.020"
vol_max_std_pct = "0.40"
macd_slow = 28
htf_enabled = false
max_secs_to_close = 700
cluster_down_confidence_add = 0.05
cluster_rsi_oversold = 30.0
cluster_mom5_abs = 0.0001
cluster_mom15_abs = 0.002
cluster_tie_min_edge_multiplier = 1.4
min_momentum_5m_abs = 0.00005
taker_direction_confirm = false
taker_yes_min_ratio = 0.50
taker_no_max_ratio = 0.50
taker_neutral_low = 0.48
taker_neutral_high = 0.52
no_confidence_penalty = 0.05
cheap_token_max_usdc = "5"
dynamic_momentum_threshold = true
momentum_vol_reference = 0.03

[asset.sol]
min_edge = "0.035"
min_confidence = "0.78"
volume_min_ratio = 0.6
min_macd_histogram_abs = 0.005
yes_confidence_penalty = 0.04
cheap_token_max_usdc = "5"
rsi_yes_max = 80.0
htf_enabled = false
max_secs_to_close = 800
adaptive_direction_penalty = true
adaptive_penalty_window = 15

[asset.xrp]
min_edge = "0.04"
min_confidence = "0.72"
volume_min_ratio = 0.4
vol_min_std_pct = "0.015"
htf_enabled = false
max_secs_to_close = 800
rsi_yes_max = 80.0
rsi_no_min = 20.0
min_momentum_5m_abs = 0.00005
# XRP YES: 39% WR vs NO 79%. Heavy penalty on YES to reduce bad trades.
yes_confidence_penalty = 0.18
cheap_token_max_usdc = "8"
