# Strategy / TA / risk — safe to commit. Secrets only in `.env`.
# Precedence: environment variable > this file > code defaults.
# Override file path: CONFIG_PATH=/path/to/custom.toml

[strategy]
assets = ["btc", "eth", "sol", "xrp", "bnb", "doge"]
durations = ["15m"]
gamma_tag_id = 102127
min_edge = "0.10"
min_confidence = "0.72"
min_order_usdc = "5"
slippage_bps = "0.002"

[technical]
spot_exchange = "binance"
candle_interval = "1m"
candle_lookback = 150
rsi_period = 16
macd_fast = 12
macd_slow = 28
macd_signal = 9
volume_min_ratio = 0.5
volume_avg_bars = 20
volume_use_closed_candle_only = true

[cluster]
rsi_oversold = 35.0
rsi_overbought = 65.0
# Direction veto: skip BUY YES when RSI above this; skip BUY NO when RSI below this (0 = off).
rsi_yes_max = 70.0
rsi_no_min = 15.0
mom5_abs = 0.003
mom15_abs = 0.005
min_market_yes_price = "0.08"
max_market_yes_price = "0.55"
min_secs_to_close = 250
cluster_tie_min_edge_multiplier = 1.3
min_momentum_5m_abs = 0.0001
neutral_taker_edge_multiplier = 1.5
# Global defaults for direction-quality filters (0 / false = off; per-asset overrides below).
min_macd_histogram_abs = 0.0
taker_direction_confirm = false
yes_confidence_penalty = 0.0
no_confidence_penalty = 0.0
expiry_dampen_last_secs = 120
cheap_token_price_threshold = "0.35"
cheap_token_max_usdc = "5"
large_order_usdc_hard_cap = "25"

[volatility]
min_std_pct = "0.025"
max_std_pct = "0.45"
sample_bars = 20

[risk]
max_position_pct = "0.05"
daily_loss_limit_pct = "0.50"
initial_balance = "200"

[htf]
enabled = true
interval = "15m"
lookback = 50
ema_period = 20

[adaptive]
enabled = true
trade_window = 10

[execution]
dry_run = true
cycle_secs = 60
# GTD lifecycle: cancel resting orders after this many seconds; REST poll only for orders older than poll_min_order_age_secs.
fill_timeout_secs = 300
poll_min_order_age_secs = 10
clob_host = "https://clob.polymarket.com"
signature_type = "GNOSIS_SAFE"
data_dir = "data"

[asset.btc]
min_edge = "0.01"
min_confidence = "0.75"
candle_lookback = 200
volume_min_ratio = 0.6
vol_min_std_pct = "0.025"
vol_max_std_pct = "0.35"
htf_enabled = true
max_secs_to_close = 900
taker_direction_confirm = true
cheap_token_max_usdc = "10"

[asset.eth]
min_edge = "0.015"
min_confidence = "0.72"
candle_lookback = 150
volume_min_ratio = 0.5
vol_min_std_pct = "0.020"
vol_max_std_pct = "0.40"
macd_slow = 28
htf_enabled = false
max_secs_to_close = 850
cluster_rsi_oversold = 30.0
cluster_mom5_abs = 0.0001
cluster_mom15_abs = 0.002
cluster_tie_min_edge_multiplier = 1.1
min_momentum_5m_abs = 0.00005
taker_direction_confirm = true
cheap_token_max_usdc = "8"
dynamic_momentum_threshold = true
momentum_vol_reference = 0.03

[asset.sol]
min_edge = "0.025"
volume_min_ratio = 0.4
min_macd_histogram_abs = 0.003
yes_confidence_penalty = 0.05
rsi_yes_max = 55.0
htf_enabled = false
max_secs_to_close = 850
adaptive_direction_penalty = true
adaptive_penalty_window = 15

[asset.xrp]
min_edge = "0.01"
min_confidence = "0.72"
volume_min_ratio = 0.4
vol_min_std_pct = "0.015"
htf_enabled = false
max_secs_to_close = 850
rsi_yes_max = 60.0
rsi_no_min = 35.0
min_momentum_5m_abs = 0.00005
cheap_token_max_usdc = "8"
dynamic_momentum_threshold = true
momentum_vol_reference = 0.025
multi_tf_enabled = true
multi_tf_interval = "5m"
multi_tf_lookback = 30

[asset.bnb]
min_edge = "0.03"
min_confidence = "0.68"
volume_min_ratio = 0.5
htf_enabled = false
max_secs_to_close = 850
min_macd_histogram_abs = 0.02
cluster_tie_min_edge_multiplier = 2.0
