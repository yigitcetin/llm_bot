# Strategy / TA / risk — safe to commit. Secrets only in `.env`.
# Precedence: environment variable > this file > code defaults.
# Override file path: CONFIG_PATH=/path/to/custom.toml

[strategy]
assets = ["btc", "eth", "sol", "xrp"]
durations = ["15m"]
gamma_tag_id = 102127
min_edge = "0.10"
min_confidence = "0.72"
min_order_usdc = "5"
slippage_bps = "0.002"

[technical]
spot_exchange = "binance"
candle_interval = "1m"
candle_lookback = 150
rsi_period = 16
macd_fast = 12
macd_slow = 28
macd_signal = 9
volume_min_ratio = 0.7
volume_avg_bars = 20
volume_use_closed_candle_only = true

[cluster]
rsi_oversold = 35.0
rsi_overbought = 65.0
mom5_abs = 0.003
mom15_abs = 0.005
min_market_yes_price = "0.15"
max_market_yes_price = "0.92"
min_secs_to_close = 120
cluster_tie_min_edge_multiplier = 1.3
expiry_dampen_last_secs = 120
cheap_token_price_threshold = "0.15"
cheap_token_max_usdc = "5"
large_order_usdc_hard_cap = "25"

[volatility]
min_std_pct = "0.025"
max_std_pct = "0.45"
sample_bars = 20

[risk]
max_position_pct = "0.05"
daily_loss_limit_pct = "0.50"
initial_balance = "200"

[htf]
enabled = true
interval = "15m"
lookback = 50
ema_period = 20

[adaptive]
enabled = true
trade_window = 50

[execution]
dry_run = true
cycle_secs = 60
clob_host = "https://clob.polymarket.com"
signature_type = "GNOSIS_SAFE"
data_dir = "data"

[asset.btc]
min_edge = "0.12"
min_confidence = "0.75"
candle_lookback = 200
volume_min_ratio = 0.8
vol_min_std_pct = "0.025"
vol_max_std_pct = "0.35"
htf_enabled = true
max_secs_to_close = 600

[asset.eth]
min_edge = "0.10"
min_confidence = "0.72"
candle_lookback = 150
volume_min_ratio = 0.7
vol_min_std_pct = "0.03"
vol_max_std_pct = "0.40"
macd_slow = 28
htf_enabled = true
cluster_rsi_oversold = 30.0
cluster_mom5_abs = 0.002
cluster_mom15_abs = 0.004

[asset.sol]
min_edge = "0.12"
volume_min_ratio = 0.7

[asset.xrp]
min_edge = "0.12"
min_confidence = "0.75"
volume_min_ratio = 0.7
vol_min_std_pct = "0.025"